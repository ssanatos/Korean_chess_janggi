<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>장기 · 對局</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --wood-dark:#2b1b10;
    --wood-panel:#3a2515;
    --wood-panel-2:#4a2f1a;
    --board-base:#c99b5f;
    --board-line:#5b3c22;
    --paper:#efe3c7;
    --paper-2:#e4d5ae;
    --ink-gold:#c8a24a;
    --han-red:#a8342a;
    --han-red-dark:#7c2620;
    --cho-green:#1f5b46;
    --cho-green-dark:#153f32;
    --disc:#e9cd93;
    --disc-rim:#9c7239;
    --muted:#c9b491;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #4a2f1a 0%, var(--wood-dark) 55%),
      var(--wood-dark);
    color:var(--paper);
    font-family:'Noto Sans KR', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 12px 60px;
  }
  header{
    text-align:center;
    margin-bottom:18px;
  }
  header h1{
    font-family:'Song Myung', serif;
    font-size:clamp(28px,6vw,42px);
    letter-spacing:0.15em;
    margin:0 0 4px;
    color:var(--ink-gold);
    text-shadow:0 2px 0 rgba(0,0,0,0.4);
  }
  header p{
    margin:0;
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.05em;
  }

  /* ---------- 설정 화면 ---------- */
  #setupScreen{
    background:var(--wood-panel);
    border:1px solid #5c3c22;
    border-radius:10px;
    padding:24px 20px;
    width:min(560px, 94vw);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
  }
  .setup-block{margin-bottom:20px;}
  .setup-block h3{
    font-family:'Noto Serif KR', serif;
    font-size:15px;
    margin:0 0 10px;
    color:var(--ink-gold);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .side-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .side-dot.han{background:var(--han-red);}
  .side-dot.cho{background:var(--cho-green);}
  .toggle-row{display:flex;gap:10px;flex-wrap:wrap;}
  .toggle-row label{
    display:flex; align-items:center; gap:6px;
    background:var(--wood-panel-2);
    border:1px solid #6b4726;
    border-radius:8px;
    padding:10px 14px;
    font-size:14px;
    cursor:pointer;
    flex:1;
    min-width:130px;
    justify-content:center;
    color:var(--paper-2);
    transition:background .15s, border-color .15s;
  }
  .toggle-row input{accent-color:var(--ink-gold);}
  .toggle-row label:has(input:checked){
    background:#5c3c22;
    border-color:var(--ink-gold);
    color:#fff;
  }
  .setup-hint{font-size:12px;color:var(--muted); margin-top:6px; line-height:1.5;}
  select, .btn{
    font-family:'Noto Sans KR', sans-serif;
  }
  select{
    background:var(--wood-panel-2);
    color:var(--paper);
    border:1px solid #6b4726;
    border-radius:8px;
    padding:8px 10px;
    font-size:14px;
    width:100%;
  }
  .btn{
    display:inline-block;
    background:linear-gradient(180deg,#c8a24a,#a9812f);
    color:#241708;
    border:none;
    border-radius:8px;
    padding:12px 20px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:0.03em;
    box-shadow:0 3px 0 #7a5c1f, 0 6px 14px rgba(0,0,0,0.35);
  }
  .btn:active{transform:translateY(2px); box-shadow:0 1px 0 #7a5c1f;}
  .btn.secondary{
    background:var(--wood-panel-2);
    color:var(--paper-2);
    box-shadow:0 3px 0 #241708, 0 4px 10px rgba(0,0,0,0.3);
    border:1px solid #6b4726;
  }
  .btn.small{padding:8px 12px; font-size:13px;}
  .btn:disabled{opacity:0.5; cursor:not-allowed;}
  #startBtnWrap{text-align:center; margin-top:22px;}

  /* ---------- 게임 화면 ---------- */
  #gameScreen{
    display:flex;
    gap:22px;
    align-items:flex-start;
    width:min(1000px, 96vw);
    flex-wrap:wrap;
    justify-content:center;
  }
  #boardWrap{
    background:linear-gradient(180deg,#5c3c22,#3a2515);
    padding:14px;
    border-radius:10px;
    box-shadow:0 14px 34px rgba(0,0,0,0.5), inset 0 0 0 1px #6b4726;
  }
  #boardSvg{ display:block; width:min(560px, 90vw); height:auto; touch-action:manipulation; }

  #sidePanel{
    width:280px;
    max-width:92vw;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .panel-box{
    background:var(--paper);
    color:#2c1c0e;
    border-radius:10px;
    padding:14px 16px;
    box-shadow:0 8px 20px rgba(0,0,0,0.35);
  }
  .turn-row{display:flex; align-items:center; justify-content:space-between;}
  .turn-badge{
    display:flex; align-items:center; gap:8px;
    font-family:'Noto Serif KR', serif;
    font-weight:700;
    font-size:16px;
  }
  #thinkingLabel{font-size:12px; color:#7a5c1f; margin-top:6px; min-height:16px;}
  .move-log{
    max-height:220px;
    overflow-y:auto;
    font-size:13px;
    line-height:1.7;
    border-top:1px solid #cbb98f;
    margin-top:10px;
    padding-top:8px;
  }
  .move-log div span.mh{color:var(--han-red-dark); font-weight:700;}
  .move-log div span.mc{color:var(--cho-green-dark); font-weight:700;}
  .controls{display:flex; gap:8px; flex-wrap:wrap;}
  .controls .btn{flex:1;}

  #modalOverlay{
    position:fixed; inset:0; background:rgba(10,6,2,0.7);
    display:flex; align-items:center; justify-content:center;
    z-index:50;
  }
  #modal{
    background:var(--paper);
    color:#2c1c0e;
    padding:30px 26px;
    border-radius:12px;
    text-align:center;
    width:min(360px,90vw);
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  #modal h2{font-family:'Song Myung', serif; margin:0 0 10px; font-size:24px;}
  #modal p{margin:0 0 20px; font-size:14px; color:#5a4326;}

  [hidden]{display:none !important;}

  @media (max-width:720px){
    #gameScreen{flex-direction:column; align-items:center;}
    #sidePanel{width:min(560px,94vw);}
  }
</style>
</head>
<body>

<header>
  <h1>將 棋</h1>
  <p>전통 장기 · AI와 대국하기</p>
</header>

<!-- ===================== 설정 화면 ===================== -->
<div id="setupScreen">

  <div class="setup-block">
    <h3>AI 난이도</h3>
    <select id="difficultySelect">
      <option value="easy">쉬움 (빠른 반응)</option>

<div id="gameScreen" hidden>

        <div class="turn-badge" id="turnBadge">
          <span class="side-dot cho"></span> 초 차례
        </div>
        <button class="btn secondary small" id="undoBtn">무르기</button>

      <div id="engineLabel" style="font-size:11px; color:#8a7350; margin-top:2px;"></div>
      <div class="move-log" id="moveLog"></div>
    </div>
    <div class="panel-box controls">
      <button class="btn secondary small" id="newGameBtn">새 게임</button>

    <h2 id="modalTitle">대국 종료</h2>

<!-- 아래 슬롯은 비어 있어도 정상 동작합니다.
     ssanatos-engine-src/merge.py로 병합하면 이 자리에 엔진 코드가 삽입되어
     외부 파일 없이 완전한 단일 HTML 파일이 됩니다. -->
<script id="ssanatos-inline-slot">
// ssanatos-engine.js
// 장기(Janggi) 탐색 엔진 - 순수 JavaScript 구현
// C++ search.cpp 의 알고리즘을 그대로 포팅 (emscripten / WASM 빌드 불필요)
// window.SsanatosEngine 으로 노출 → Emscripten MODULARIZE=1 출력과 동일한 인터페이스
(function () {
"use strict";

// ─── 상수 ─────────────────────────────────────────────────────────────────────
const W = 9, H = 10;
const FILE_LEFT = 3, RANK_TOP = 3;
const MAX_MV = 200;
const INF = 9999999;
const MSTRIDE = 5; // fx,fy,tx,ty,cap per move slot

const PS = {
  NOTHING:0,
  CHO_JANG:1, CHO_SA:2, CHO_PO:3, CHO_JOL:4, CHO_MA:5, CHO_SANG:6, CHO_CHA:7,
  BOUNDARY:8,
  HAN_JANG:9, HAN_SA:10, HAN_PO:11, HAN_JOL:12, HAN_MA:13, HAN_SANG:14, HAN_CHA:15,
};
const SD = { NOTHING:0, CHO:1, HAN:2 };

// 기물 가치 (C++ 원본과 동일)
const PV = [
  0,500000,10000,25000,5000,15000,9000,35100,  // 0-7 (NOTHING, CHO)
  0,500000,10000,25000,5000,15000,9000,35100   // 8-15 (BOUNDARY, HAN)
];

// 문자 → 기물 ID  (addPiece 인터페이스용)
const CP2P = {
  'J':1,'A':2,'P':3,'B':4,'S':5,'M':6,'C':7,
  'j':9,'a':10,'p':11,'b':12,'s':13,'m':14,'c':15
};

function MAKE_SQ(x,y){ return (x+FILE_LEFT)+((y+RANK_TOP)<<4); }
function MAKE_MV(s,d){ return (s+(d<<8))>>>0; }

// ─── RC4 (Zobrist 키 생성용, C++ rc4.hpp 와 동일) ──────────────────────────
class RC4 {
  constructor(){ this.s=new Uint8Array(256); this.x=0; this.y=0; }
  init(key){
    const s=this.s;
    for(let i=0;i<256;i++) s[i]=i;
    let j=0;
    for(let i=0;i<256;i++){
      j=(j+s[i]+key[i%key.length])&255;
      const t=s[i]; s[i]=s[j]; s[j]=t;
    }
  }
  next(){
    const s=this.s;
    this.x=(this.x+1)&255;
    this.y=(this.y+s[this.x])&255;
    const t=s[this.x]; s[this.x]=s[this.y]; s[this.y]=t;
    return s[(s[this.x]+s[this.y])&255];
  }
  long(){
    const a=this.next(),b=this.next(),c=this.next(),d=this.next();
    return (a|(b<<8)|(c<<16)|(d<<24))|0;
  }
}

// ─── Zobrist 테이블 (모듈 단위로 1회만 초기화) ─────────────────────────────
let ZK=null, ZL=null, ZKP=0, ZLP=0;
let hashTbl=null, hashSz=0;

function initZobrist(level){
  const rc=new RC4();
  rc.init(new Uint8Array([0]));
  ZKP=rc.long(); rc.long(); ZLP=rc.long();
  ZK=[]; ZL=[];
  for(let i=0;i<16;i++){
    ZK.push(new Int32Array(256)); ZL.push(new Int32Array(256));
    for(let j=0;j<256;j++){
      ZK[i][j]=rc.long(); rc.long(); ZL[i][j]=rc.long();
    }
  }
  hashSz=1<<level;
  hashTbl=[];
  for(let i=0;i<hashSz;i++) hashTbl.push({k:0,l:0,d:0,f:0,s:0});
}

const HA=1, HB=2, HP=3;

function recHash(key,lock,flag,score,rem){
  const i=(key&0x7fffffff)%hashSz, e=hashTbl[i];
  if(e.d>rem) return; // 더 깊은 탐색 결과 유지
  e.k=key; e.l=lock; e.d=rem; e.f=flag; e.s=score;
}
function probeHash(key,lock,alpha,beta,rem){
  const i=(key&0x7fffffff)%hashSz, e=hashTbl[i];
  if(e.k!==key||e.l!==lock||e.d<rem) return -INF;
  if(e.f===HP) return e.s;
  if(e.f===HA&&e.s<=alpha) return alpha;
  if(e.f===HB&&e.s>=beta)  return beta;
  return -INF;
}

// ─── 궁성 대각선 ────────────────────────────────────────────────────────────
const DIAG=[
  [[0,3],[1,4],[2,5]], [[0,5],[1,4],[2,3]],  // 한(HAN) 궁성
  [[7,3],[8,4],[9,5]], [[7,5],[8,4],[9,3]],  // 초(CHO) 궁성
];
// (row*9+col) → [{line, idx}] 사전 계산
const diagOf=Array.from({length:H*W},()=>[]);
for(const line of DIAG)
  for(let idx=0;idx<line.length;idx++){
    const [r,c]=line[idx];
    diagOf[r*W+c].push({line,idx});
  }

function inHan(r,c){ return r>=0&&r<=2&&c>=3&&c<=5; }
function inCho(r,c){ return r>=7&&r<=9&&c>=3&&c<=5; }

// ─── 기물 이동 오프셋 ────────────────────────────────────────────────────────
const HORSE=[
  {lr:0,lc:-1,dr:-1,dc:-2},{lr:0,lc:-1,dr:1,dc:-2},
  {lr:0,lc:1, dr:-1,dc:2},{lr:0,lc:1, dr:1,dc:2},
  {lr:-1,lc:0,dr:-2,dc:-1},{lr:-1,lc:0,dr:-2,dc:1},
  {lr:1,lc:0, dr:2,dc:-1},{lr:1,lc:0, dr:2,dc:1},
];
const SANG=[
  {lr:0,lc:-1,er:-1,ec:-2,dr:-2,dc:-3},{lr:0,lc:-1,er:1,ec:-2,dr:2,dc:-3},
  {lr:0,lc:1, er:-1,ec:2, dr:-2,dc:3},{lr:0,lc:1, er:1,ec:2, dr:2,dc:3},
  {lr:-1,lc:0,er:-2,ec:-1,dr:-3,dc:-2},{lr:-1,lc:0,er:-2,ec:1,dr:-3,dc:2},
  {lr:1,lc:0, er:2,ec:-1,dr:3,dc:-2},{lr:1,lc:0, er:2,ec:1, dr:3,dc:2},
];
const DIRS=[[-1,0],[1,0],[0,-1],[0,1]];

// ─── Search 클래스 ───────────────────────────────────────────────────────────
class Search {
  constructor(){
    // board: b[y*W+x] = piece id
    this.b=new Uint8Array(H*W);
    this.zk=0; this.zl=0;
    this.side=SD.CHO;
    this.hist=[];      // makeMove / moveBack 기보 스택
    this.cnt=0;        // 총 이동 수
    this.phase=0;      // 0=OPENING, 1=MIDGAME
    this.isMax=false;

    // 후보 수 버퍼 (탐색 중 재사용, 깊이별로 분리)
    // mvBuf[depth+14]: Int32Array[MAX_MV*MSTRIDE]
    this._bufs=Array.from({length:30},()=>new Int32Array(MAX_MV*MSTRIDE));
    this._nBuf=new Int32Array(30);
    // 루트 탐색 임시 버퍼
    this._tmp=new Int32Array(MAX_MV*MSTRIDE);
    this._tmpN=0;

    this.cutoff=3; this.feedover=8;
    this.entryLim=4000; this.maxLim=8000;
    this.minDepth=3;
  }

  // ── 공개 인터페이스 ────────────────────────────────────────────────────────
  initParams(depth,hashLevel,entry,maxTime){
    if(!ZK) initZobrist(hashLevel||17);
    this.minDepth=depth||3;
    this.entryLim=entry||4000;
    this.maxLim=maxTime||8000;
  }

  addPiece(x,y,cp){
    const p=CP2P[cp]; if(!p) return;
    this._place(x,y,p,false);
  }

  defaultSetting(){ /* 외부에서 addPiece로 초기화하므로 불필요 */ }

  isLegalMove(fx,fy,tx,ty){
    const saveSide=this.side;
    this.side=this._sideOf(fx,fy);
    if(!this.side){ this.side=saveSide; return -1; }
    const buf=this._tmp; this._tmpN=0;
    this._genPiece(fx,fy,buf,this._tmpN);
    // _genPiece 는 _tmpN 을 직접 갱신하지 않으므로 카운터 별도 관리
    this.side=saveSide;
    // 재계산: 임시 버퍼로 직접
    this.side=this._sideOf(fx,fy);
    const n=this._genPieceTo(fx,fy);
    this.side=saveSide;
    for(let i=0;i<n;i++){
      const base=i*MSTRIDE;
      if(this._tmp[base+2]===tx&&this._tmp[base+3]===ty) return 1;
    }
    return -2;
  }

  makeMove(fx,fy,tx,ty){
    if(!this.b[fy*W+fx]) return -1;
    if(this.isLegalMove(fx,fy,tx,ty)<0) return -2;
    const cap=this.b[ty*W+tx];
    this.hist.push({fx,fy,tx,ty,cap});
    this._apply(fx,fy,tx,ty,cap);
    this._flip();
    this.cnt++;
    if(this.phase===0&&this.cnt>18) this.phase=1;
    return 1;
  }

  moveBack(){
    if(!this.hist.length) return false;
    const h=this.hist.pop();
    const p=this.b[h.ty*W+h.tx];
    this._place(h.fx,h.fy,p,false);
    this._place(h.tx,h.ty,p,true);
    if(h.cap) this._place(h.tx,h.ty,h.cap,false);
    this._flip();
    this.cnt--;
    if(this.phase===1&&this.cnt<=18) this.phase=0;
    return true;
  }

  getBestMove(side,repeatmv){
    if(!ZK){ initZobrist(17); }
    this.isMax=(side===SD.HAN);
    this.side=side;

    // 루트 후보 수 생성
    const n=this._genAll(this._tmp,0);
    if(n===0) return 0;

    // 탐색 깊이 자동 조절 (C++ 원본과 동일)
    this.cutoff=Math.max(this.minDepth, 6-Math.floor(n/10));
    this.feedover=Math.max(this.cutoff+5, 10-Math.floor(n/10));

    // 정렬용 평가점수 계산
    this._scoreRoot(this._tmp,n);

    // 정렬
    this._sortBuf(this._tmp,n,this.isMax);

    // repeatmv 제거
    let rootN=n;
    if(repeatmv>0){
      for(let i=0;i<rootN;i++){
        const b=i*MSTRIDE;
        if(MAKE_MV(MAKE_SQ(this._tmp[b],this._tmp[b+1]),
                   MAKE_SQ(this._tmp[b+2],this._tmp[b+3]))===repeatmv){
          // 해당 항목 제거
          this._tmp.copyWithin(b,b+MSTRIDE,(rootN)*MSTRIDE);
          rootN--; break;
        }
      }
    }
    if(rootN===0) return 0;

    // 루트 수 목록을 별도 배열에 고정
    const rootBuf=new Int32Array(this._tmp.subarray(0,rootN*MSTRIDE));

    const t0=Date.now();

    const tryRoot=(i,a,bv,d)=>{
      const base=i*MSTRIDE;
      const fx=rootBuf[base],fy=rootBuf[base+1],tx=rootBuf[base+2],ty=rootBuf[base+3],cap=rootBuf[base+4];
      this._apply(fx,fy,tx,ty,cap);
      this._flip();
      const v=this.isMax ? this._minV(a,bv,d) : this._maxV(a,bv,d);
      this._flip();
      this._undo(fx,fy,tx,ty,cap);
      return v;
    };

    let selIdx=0, bestIdx=0, bestScore;

    if(this.isMax){
      // HAN 최대화
      let alpha=tryRoot(0,-INF,INF,0);
      let beta=alpha+1; selIdx=0;
      for(let i=1;i<rootN;i++){
        let s=tryRoot(i,alpha,beta,0);
        if(s===beta) s=tryRoot(i,s,INF,0);
        if(s>alpha){ alpha=s; selIdx=i; beta=alpha+1; bestIdx=i; }
      }
      bestScore=alpha;
      for(let cnt=0;cnt<4;cnt++){
        if(Date.now()-t0>=this.entryLim) break;
        let a=bestScore-100;
        let s=tryRoot(selIdx,a,INF,-(1+cnt));
        if(s===a) s=tryRoot(selIdx,-INF,a,-(1+cnt));
        a=bestScore=s;
        let b=a+1; if(bestIdx!==0) a-=1;
        const sid=bestIdx;
        for(let i=0;i<rootN;i++){
          if(i===sid) continue;
          let sc=tryRoot(i,a,b,-(1+cnt));
          if(sc===b) sc=tryRoot(i,sc,INF,-(1+cnt));
          if(sc>bestScore||(sc===bestScore&&i<bestIdx)){
            a=bestScore=sc; selIdx=i; b=a+1; bestIdx=i;
          }
          if(Date.now()-t0>=this.maxLim) break;
        }
      }
    } else {
      // CHO 최소화
      let beta=tryRoot(0,-INF,INF,0);
      let alpha=beta-1; selIdx=0;
      for(let i=1;i<rootN;i++){
        let s=tryRoot(i,alpha,beta,0);
        if(s===alpha){ alpha=-INF; s=tryRoot(i,alpha,s+1,0); }
        if(s<beta){ beta=s; selIdx=i; alpha=beta-1; bestIdx=i; }
      }
      bestScore=beta;
      for(let cnt=0;cnt<5;cnt++){
        if(Date.now()-t0>=this.entryLim) break;
        let b=bestScore+100;
        let s=tryRoot(selIdx,-INF,b,-(1+cnt));
        if(s===b) s=tryRoot(selIdx,b-1,INF,-(1+cnt));
        b=bestScore=s;
        let a=b-1; if(bestIdx!==0) b+=1;
        const sid=bestIdx;
        for(let i=0;i<rootN;i++){
          if(i===sid) continue;
          let sc=tryRoot(i,a,b,-(1+cnt));
          if(sc===a){ a=-INF; sc=tryRoot(i,a,sc+1,-(1+cnt)); }
          if(sc<bestScore||(sc===bestScore&&i<bestIdx)){
            b=bestScore=sc; selIdx=i; a=b-1; bestIdx=i;
          }
          if(Date.now()-t0>=this.maxLim) break;
        }
      }
    }

    const base=selIdx*MSTRIDE;
    return MAKE_MV(
      MAKE_SQ(rootBuf[base],rootBuf[base+1]),
      MAKE_SQ(rootBuf[base+2],rootBuf[base+3])
    );
  }

  // getNextPieceMoves: 특정 기물의 가능한 이동 목록 반환 (UI용)
  getNextPieceMoves(fx,fy){
    const saveSide=this.side;
    this.side=this._sideOf(fx,fy);
    if(!this.side){ this.side=saveSide; return new Int32Array(0); }
    const n=this._genPieceTo(fx,fy);
    this.side=saveSide;
    const out=new Int32Array(n*2);
    for(let i=0;i<n;i++){
      out[i*2]=this._tmp[i*MSTRIDE+2];
      out[i*2+1]=this._tmp[i*MSTRIDE+3];
    }
    return out;
  }

  getScore(){ return 0; }
  getVersion(){ return 14; }

  // ── 내부: 보드 ────────────────────────────────────────────────────────────
  _place(x,y,p,del){
    const sq=MAKE_SQ(x,y);
    this.zk^=ZK[p][sq]; this.zl^=ZL[p][sq];
    this.b[y*W+x]=del?0:p;
  }

  _sideOf(x,y){
    const p=this.b[y*W+x];
    if(!p) return SD.NOTHING;
    return p<PS.BOUNDARY?SD.CHO:SD.HAN;
  }

  _flip(){
    this.side=this.side===SD.CHO?SD.HAN:SD.CHO;
    this.zk^=ZKP; this.zl^=ZLP;
  }

  _apply(fx,fy,tx,ty,cap){
    const p=this.b[fy*W+fx];
    if(cap) this._place(tx,ty,cap,true);
    this._place(tx,ty,p,false);
    this._place(fx,fy,p,true);
  }

  _undo(fx,fy,tx,ty,cap){
    const p=this.b[ty*W+tx];
    this._place(fx,fy,p,false);
    this._place(tx,ty,p,true);
    if(cap) this._place(tx,ty,cap,false);
  }

  // ── 내부: 수 생성 ─────────────────────────────────────────────────────────

  // 특정 기물의 수를 this._tmp 에 채우고 개수를 반환
  _genPieceTo(fx,fy){
    this._tmpN=0;
    this._genPiece(fx,fy,this._tmp,0);
    return this._tmpN;
  }

  // buf[startIdx..] 에 기물(fx,fy)의 모든 후보수를 추가. 반환=추가된 수
  _genPiece(fx,fy,buf,_off){
    // _off 대신 this._tmpN 을 사용 (단순화)
    const p=this.b[fy*W+fx]; if(!p) return;
    const inPal=this.side===SD.CHO?inCho:inHan;

    const tryAdd=(tx,ty)=>{
      if(tx<0||tx>=W||ty<0||ty>=H) return;
      if(this._sideOf(tx,ty)===this.side) return;
      if(this._tmpN>=MAX_MV) return;
      const base=this._tmpN*MSTRIDE;
      buf[base]=fx; buf[base+1]=fy; buf[base+2]=tx; buf[base+3]=ty;
      buf[base+4]=this.b[ty*W+tx];
      this._tmpN++;
    };

    if(p===PS.CHO_JANG||p===PS.HAN_JANG||p===PS.CHO_SA||p===PS.HAN_SA){
      for(const[dr,dc]of DIRS){
        const nr=fy+dr,nc=fx+dc;
        if(inPal(nr,nc)) tryAdd(nc,nr);
      }
      for(const{line,idx}of diagOf[fy*W+fx]){
        for(const ni of[idx-1,idx+1]){
          if(ni>=0&&ni<line.length){
            const[nr,nc]=line[ni];
            if(inPal(nr,nc)) tryAdd(nc,nr);
          }
        }
      }
    }

    else if(p===PS.CHO_MA||p===PS.HAN_MA){
      for(const h of HORSE){
        const lr=fy+h.lr,lc=fx+h.lc;
        if(lr<0||lr>=H||lc<0||lc>=W||this.b[lr*W+lc]) continue;
        tryAdd(fx+h.dc,fy+h.dr);
      }
    }

    else if(p===PS.CHO_SANG||p===PS.HAN_SANG){
      for(const s of SANG){
        const lr=fy+s.lr,lc=fx+s.lc;
        if(lr<0||lr>=H||lc<0||lc>=W||this.b[lr*W+lc]) continue;
        const er=fy+s.er,ec=fx+s.ec;
        if(er<0||er>=H||ec<0||ec>=W||this.b[er*W+ec]) continue;
        tryAdd(fx+s.dc,fy+s.dr);
      }
    }

    else if(p===PS.CHO_CHA||p===PS.HAN_CHA){
      for(const[dr,dc]of DIRS){
        let nr=fy+dr,nc=fx+dc;
        while(nr>=0&&nr<H&&nc>=0&&nc<W){
          const tp=this.b[nr*W+nc];
          if(!tp) tryAdd(nc,nr);
          else{ tryAdd(nc,nr); break; }
          nr+=dr; nc+=dc;
        }
      }
      for(const{line,idx}of diagOf[fy*W+fx]){
        for(const dir of[-1,1]){
          let ni=idx+dir;
          while(ni>=0&&ni<line.length){
            const[nr,nc]=line[ni];
            const tp=this.b[nr*W+nc];
            if(!tp) tryAdd(nc,nr);
            else{ tryAdd(nc,nr); break; }
            ni+=dir;
          }
        }
      }
    }

    else if(p===PS.CHO_PO||p===PS.HAN_PO){
      for(const[dr,dc]of DIRS){
        let nr=fy+dr,nc=fx+dc,found=false;
        while(nr>=0&&nr<H&&nc>=0&&nc<W){
          const tp=this.b[nr*W+nc];
          if(!found){
            if(tp){ if(tp===PS.CHO_PO||tp===PS.HAN_PO) break; found=true; }
          } else {
            if(!tp) tryAdd(nc,nr);
            else{ if(tp!==PS.CHO_PO&&tp!==PS.HAN_PO) tryAdd(nc,nr); break; }
          }
          nr+=dr; nc+=dc;
        }
      }
      for(const{line,idx}of diagOf[fy*W+fx]){
        if(idx!==0&&idx!==2) continue;
        const[mr,mc]=line[1];
        const mp=this.b[mr*W+mc];
        if(!mp||mp===PS.CHO_PO||mp===PS.HAN_PO) continue;
        const fi=idx===0?2:0;
        const[fr,fc]=line[fi];
        const fp=this.b[fr*W+fc];
        if(!fp) tryAdd(fc,fr);
        else if(fp!==PS.CHO_PO&&fp!==PS.HAN_PO) tryAdd(fc,fr);
      }
    }

    else if(p===PS.CHO_JOL||p===PS.HAN_JOL){
      // CHO→위(row-1), HAN→아래(row+1)
      const fwd=this.side===SD.CHO?-1:1;
      tryAdd(fx,fy+fwd);
      tryAdd(fx-1,fy);
      tryAdd(fx+1,fy);
      for(const{line,idx}of diagOf[fy*W+fx]){
        for(const ni of[idx-1,idx+1]){
          if(ni>=0&&ni<line.length){
            const[nr,nc]=line[ni];
            const dr=nr-fy;
            if(Math.sign(dr)===fwd||dr===0) tryAdd(nc,nr);
          }
        }
      }
    }
  }

  // 현재 side 의 모든 기물 수를 buf 에 채우고 개수 반환
  _genAll(buf,_unused){
    this._tmpN=0;
    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      const p=this.b[y*W+x]; if(!p) continue;
      const ps=p<PS.BOUNDARY?SD.CHO:SD.HAN;
      if(ps!==this.side) continue;
      this._genPiece(x,y,buf,0);
    }
    return this._tmpN;
  }

  // ── 내부: 수순 정렬 ─────────────────────────────────────────────────────
  _scoreRoot(buf,n){
    // 각 수를 실제로 두어보고 정적 평가 → 정렬용 점수 저장 (C++ 원본 방식)
    for(let i=0;i<n;i++){
      const base=i*MSTRIDE;
      const fx=buf[base],fy=buf[base+1],tx=buf[base+2],ty=buf[base+3],cap=buf[base+4];
      this._apply(fx,fy,tx,ty,cap);
      // ord는 MSTRIDE-1 위치 대신 별도 Int32Array 에 저장
      this._scores||(this._scores=new Int32Array(MAX_MV));
      this._scores[i]=this._eval();
      this._undo(fx,fy,tx,ty,cap);
    }
  }

  _sortBuf(buf,n,descending){
    if(!this._scores) return;
    // 인덱스 배열로 정렬 후 순서 재배치
    const idx=Array.from({length:n},(_,i)=>i);
    const sc=this._scores;
    idx.sort((a,b)=>descending?sc[b]-sc[a]:sc[a]-sc[b]);
    const tmp=buf.slice(0,n*MSTRIDE);
    for(let i=0;i<n;i++){
      buf.set(tmp.subarray(idx[i]*MSTRIDE,(idx[i]+1)*MSTRIDE),i*MSTRIDE);
    }
  }

  // 탐색 내부의 다음 수 목록: 깊이별 버퍼 사용 (깊이 범위 -14 ~ +15)
  _nextStage(depth){
    const di=depth+14; // 버퍼 인덱스 (depth 는 음수 가능)
    const buf=this._bufs[di];
    const saveTmp=this._tmp, saveTmpN=this._tmpN;
    this._tmp=buf; this._tmpN=0;
    const n=this._genAll(buf,0);
    this._nBuf[di]=n;
    // 평가 기반 정렬
    if(!this._scores) this._scores=new Int32Array(MAX_MV);
    for(let i=0;i<n;i++){
      const base=i*MSTRIDE;
      const fx=buf[base],fy=buf[base+1],tx=buf[base+2],ty=buf[base+3],cap=buf[base+4];
      this._apply(fx,fy,tx,ty,cap);
      this._scores[i]=this._eval();
      this._undo(fx,fy,tx,ty,cap);
    }
    this._sortBuf(buf,n,this.side===SD.HAN);
    this._tmp=saveTmp; this._tmpN=saveTmpN;
    return n;
  }

  // ── 내부: 평가함수 ──────────────────────────────────────────────────────
  _eval(){
    const b=this.b;
    let score=0;
    let cjr=-1,cjc=-1,hjr=-1,hjc=-1;

    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      const p=b[y*W+x]; if(!p) continue;
      const v=PV[p];
      if(p<PS.BOUNDARY){
        score-=v;
        if(p===PS.CHO_JANG){cjr=y;cjc=x;}
      } else {
        score+=v;
        if(p===PS.HAN_JANG){hjr=y;hjc=x;}
      }
    }

    // 위치 보너스
    for(let y=0;y<H;y++) for(let x=0;x<W;x++){
      const p=b[y*W+x]; if(!p) continue;
      switch(p){
        case PS.CHO_JOL: if(y<6) score-=(6-y)*200; break;
        case PS.HAN_JOL: if(y>3) score+=(y-3)*200; break;
        case PS.CHO_CHA:
          if(hjr>=0){
            const d=Math.abs(y-hjr)+Math.abs(x-hjc);
            score-=Math.max(0,300-d*30);
          }
          break;
        case PS.HAN_CHA:
          if(cjr>=0){
            const d=Math.abs(y-cjr)+Math.abs(x-cjc);
            score+=Math.max(0,300-d*30);
          }
          break;
        case PS.CHO_PO:
          if(cjr>=0&&x===cjc&&y>cjr) score-=500; break;
        case PS.HAN_PO:
          if(hjr>=0&&x===hjc&&y<hjr) score+=500; break;
      }
    }
    return score;
  }

  // ── 내부: 알파베타 탐색 ─────────────────────────────────────────────────
  _cutoff(depth){ return depth>=this.cutoff; }

  _maxV(alpha,beta,depth){
    if(this._cutoff(depth)) return this._eval();
    const rem=this.cutoff-depth;
    const probe=probeHash(this.zk,this.zl,alpha,beta,rem);
    if(probe>-INF) return probe;

    const oa=alpha;
    const n=this._nextStage(depth);
    if(n===0) return this._eval();

    const di=depth+14;
    const buf=this._bufs[di];

    for(let i=0;i<n;i++){
      const base=i*MSTRIDE;
      const fx=buf[base],fy=buf[base+1],tx=buf[base+2],ty=buf[base+3],cap=buf[base+4];
      this._apply(fx,fy,tx,ty,cap); this._flip();
      const v=this._minV(alpha,beta,depth+1);
      this._flip(); this._undo(fx,fy,tx,ty,cap);
      if(v>alpha) alpha=v;
      if(alpha>=beta){ recHash(this.zk,this.zl,HB,v,rem); return beta; }
    }
    recHash(this.zk,this.zl,HP,alpha,rem);
    return alpha;
  }

  _minV(alpha,beta,depth){
    if(this._cutoff(depth)) return this._eval();
    const rem=this.cutoff-depth;
    const probe=probeHash(this.zk,this.zl,alpha,beta,rem);
    if(probe>-INF) return probe;

    const ob=beta;
    const n=this._nextStage(depth);
    if(n===0) return this._eval();

    const di=depth+14;
    const buf=this._bufs[di];

    for(let i=0;i<n;i++){
      const base=i*MSTRIDE;
      const fx=buf[base],fy=buf[base+1],tx=buf[base+2],ty=buf[base+3],cap=buf[base+4];
      this._apply(fx,fy,tx,ty,cap); this._flip();
      const v=this._maxV(alpha,beta,depth+1);
      this._flip(); this._undo(fx,fy,tx,ty,cap);
      if(v<beta) beta=v;
      if(beta<=alpha){ recHash(this.zk,this.zl,HA,v,rem); return alpha; }
    }
    recHash(this.zk,this.zl,HP,beta,rem);
    return beta;
  }
}

// ─── 브라우저 export (Emscripten MODULARIZE=1 과 동일한 인터페이스) ──────────
window.SsanatosEngine = function(){
  return Promise.resolve({ Search });
};

})();

</script>

<script>
"use strict";
/* =========================================================
   1. 장기 규칙 엔진
   ========================================================= */
const ROWS = 10, COLS = 9;
function inBoard(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }

const DIAG_LINES = [
  [{r:0,c:3},{r:1,c:4},{r:2,c:5}],
  [{r:0,c:5},{r:1,c:4},{r:2,c:3}],
  [{r:7,c:3},{r:8,c:4},{r:9,c:5}],
  [{r:7,c:5},{r:8,c:4},{r:9,c:3}]
];
function findDiagLines(r, c) {
  const res = [];
  for (const line of DIAG_LINES) {
    const idx = line.findIndex(p => p.r === r && p.c === c);
    if (idx !== -1) res.push({ line, idx });
  }
  return res;
}
function inPalace(r, c, side) {
  if (side === 'han') return r >= 0 && r <= 2 && c >= 3 && c <= 5;
  return r >= 7 && r <= 9 && c >= 3 && c <= 5;
}
function pieceAt(board, r, c) { return board[r][c]; }
function cloneBoard(board) { return board.map(row => row.slice()); }

function initialBoard(choArrangement, hanArrangement) {
  const b = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  function place(r, c, type, side) { b[r][c] = { type, side }; }
  function backRank(r, side, arrangement) {
    place(r, 0, 'R', side); place(r, 8, 'R', side);
    place(r, 3, 'A', side); place(r, 5, 'A', side);
    if (arrangement.left === '상마') { place(r, 1, 'E', side); place(r, 2, 'H', side); }
    else { place(r, 1, 'H', side); place(r, 2, 'E', side); }
    if (arrangement.right === '마상') { place(r, 6, 'H', side); place(r, 7, 'E', side); }
    else { place(r, 6, 'E', side); place(r, 7, 'H', side); }
  }
  backRank(0, 'han', hanArrangement);
  place(1, 4, 'G', 'han'); place(2, 1, 'C', 'han'); place(2, 7, 'C', 'han');
  for (let c = 0; c <= 8; c += 2) place(3, c, 'S', 'han');

  backRank(9, 'cho', choArrangement);
  place(8, 4, 'G', 'cho'); place(7, 1, 'C', 'cho'); place(7, 7, 'C', 'cho');
  for (let c = 0; c <= 8; c += 2) place(6, c, 'S', 'cho');
  return b;
}

const HORSE_OFFSETS = [
  { leg:[0,-1], d:[-1,-2] }, { leg:[0,-1], d:[1,-2] },
  { leg:[0,1],  d:[-1,2] },  { leg:[0,1],  d:[1,2] },
  { leg:[-1,0], d:[-2,-1] }, { leg:[-1,0], d:[-2,1] },
  { leg:[1,0],  d:[2,-1] },  { leg:[1,0],  d:[2,1] }
];
const ELEPHANT_OFFSETS = [
  { leg:[0,-1], eye:[-1,-2], d:[-2,-3] }, { leg:[0,-1], eye:[1,-2], d:[2,-3] },
  { leg:[0,1],  eye:[-1,2],  d:[-2,3] },  { leg:[0,1],  eye:[1,2],  d:[2,3] },
  { leg:[-1,0], eye:[-2,-1], d:[-3,-2] }, { leg:[-1,0], eye:[-2,1], d:[-3,2] },
  { leg:[1,0],  eye:[2,-1],  d:[3,-2] },  { leg:[1,0],  eye:[2,1],  d:[3,2] }
];

function addIfValid(moves, board, side, r, c) {
  if (!inBoard(r, c)) return;
  const p = pieceAt(board, r, c);
  if (p && p.side === side) return;
  moves.push({ r, c, capture: !!p });
}

function genPieceMoves(board, r, c) {
  const piece = board[r][c];
  if (!piece) return [];
  const { type, side } = piece;
  const moves = [];

  if (type === 'G' || type === 'A') {
    const deltas = [[-1,0],[1,0],[0,-1],[0,1]];
    for (const [dr, dc] of deltas) {
      const nr = r + dr, nc = c + dc;
      if (inPalace(nr, nc, side)) addIfValid(moves, board, side, nr, nc);
    }
    for (const { line, idx } of findDiagLines(r, c)) {
      for (const ni of [idx - 1, idx + 1]) {
        if (ni >= 0 && ni < line.length) {
          const p2 = line[ni];
          if (inPalace(p2.r, p2.c, side)) addIfValid(moves, board, side, p2.r, p2.c);
        }
      }
    }
  } else if (type === 'H') {
    for (const off of HORSE_OFFSETS) {
      const lr = r + off.leg[0], lc = c + off.leg[1];
      if (!inBoard(lr, lc) || pieceAt(board, lr, lc)) continue;
      addIfValid(moves, board, side, r + off.d[0], c + off.d[1]);
    }
  } else if (type === 'E') {
    for (const off of ELEPHANT_OFFSETS) {
      const lr = r + off.leg[0], lc = c + off.leg[1];
      if (!inBoard(lr, lc) || pieceAt(board, lr, lc)) continue;
      const er = r + off.eye[0], ec = c + off.eye[1];
      if (!inBoard(er, ec) || pieceAt(board, er, ec)) continue;
      addIfValid(moves, board, side, r + off.d[0], c + off.d[1]);
    }
  } else if (type === 'R') {
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (const [dr, dc] of dirs) {
      let nr = r + dr, nc = c + dc;
      while (inBoard(nr, nc)) {
        const p = pieceAt(board, nr, nc);
        if (!p) moves.push({ r: nr, c: nc, capture:false });
        else { if (p.side !== side) moves.push({ r: nr, c: nc, capture:true }); break; }
        nr += dr; nc += dc;
      }
    }
    for (const { line, idx } of findDiagLines(r, c)) {
      for (const dir of [-1, 1]) {
        let ni = idx + dir;
        while (ni >= 0 && ni < line.length) {
          const p2 = line[ni];
          const p = pieceAt(board, p2.r, p2.c);
          if (!p) moves.push({ r: p2.r, c: p2.c, capture:false });
          else { if (p.side !== side) moves.push({ r: p2.r, c: p2.c, capture:true }); break; }
          ni += dir;
        }
      }
    }
  } else if (type === 'C') {
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (const [dr, dc] of dirs) {
      let nr = r + dr, nc = c + dc;
      let screenFound = false;
      while (inBoard(nr, nc)) {
        const p = pieceAt(board, nr, nc);
        if (!screenFound) {
          if (p) { if (p.type === 'C') break; screenFound = true; }
        } else {
          if (!p) moves.push({ r: nr, c: nc, capture:false });
          else { if (p.side !== side && p.type !== 'C') moves.push({ r: nr, c: nc, capture:true }); break; }
        }
        nr += dr; nc += dc;
      }
    }
    for (const { line, idx } of findDiagLines(r, c)) {
      if (idx !== 0 && idx !== 2) continue;
      const mid = line[1];
      const midPiece = pieceAt(board, mid.r, mid.c);
      if (!midPiece || midPiece.type === 'C') continue;
      const farIdx = idx === 0 ? 2 : 0;
      const far = line[farIdx];
      const farPiece = pieceAt(board, far.r, far.c);
      if (!farPiece) moves.push({ r: far.r, c: far.c, capture:false });
      else if (farPiece.side !== side && farPiece.type !== 'C') moves.push({ r: far.r, c: far.c, capture:true });
    }
  } else if (type === 'S') {
    const fwd = side === 'han' ? 1 : -1;
    addIfValid(moves, board, side, r + fwd, c);
    addIfValid(moves, board, side, r, c - 1);
    addIfValid(moves, board, side, r, c + 1);
    for (const { line, idx } of findDiagLines(r, c)) {
      for (const ni of [idx - 1, idx + 1]) {
        if (ni >= 0 && ni < line.length) {
          const p2 = line[ni];
          const dr = p2.r - r;
          if (Math.sign(dr) === fwd || dr === 0) addIfValid(moves, board, side, p2.r, p2.c);
        }
      }
    }
  }
  return moves;
}

function genAllPseudoMoves(board, side) {
  const all = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c];
      if (p && p.side === side) {
        const mv = genPieceMoves(board, r, c);
        for (const m of mv) all.push({ from:{r,c}, to:{r:m.r,c:m.c}, capture:m.capture, piece:p.type });
      }
    }
  return all;
}

function findGeneral(board, side) {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c];
      if (p && p.side === side && p.type === 'G') return { r, c };
    }
  return null;
}

function isSquareAttacked(board, r, c, bySide) {
  for (let br = 0; br < ROWS; br++)
    for (let bc = 0; bc < COLS; bc++) {
      const p = board[br][bc];
      if (p && p.side === bySide) {
        const mv = genPieceMoves(board, br, bc);
        if (mv.some(m => m.r === r && m.c === c)) return true;
      }
    }
  return false;
}

function isInCheck(board, side) {
  const g = findGeneral(board, side);
  if (!g) return false;
  return isSquareAttacked(board, g.r, g.c, side === 'han' ? 'cho' : 'han');
}

function applyMove(board, move) {
  const nb = cloneBoard(board);
  const piece = nb[move.from.r][move.from.c];
  const captured = nb[move.to.r][move.to.c];
  nb[move.to.r][move.to.c] = piece;
  nb[move.from.r][move.from.c] = null;
  return { board: nb, captured };
}

function genLegalMoves(board, side) {
  const pseudo = genAllPseudoMoves(board, side);
  const legal = [];
  for (const m of pseudo) {
    const { board: nb } = applyMove(board, m);
    if (!isInCheck(nb, side)) legal.push(m);
  }
  return legal;
}

/* ---------------- AI (negamax + alpha-beta) ---------------- */
const PIECE_VALUE = { G:10000, R:130, C:70, H:50, E:30, A:30, S:20 };
function opponent(side) { return side === 'han' ? 'cho' : 'han'; }

function evaluate(board, toMove) {
  let score = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c];
      if (!p) continue;
      let v = PIECE_VALUE[p.type];
      if (p.type === 'S') {
        const crossed = p.side === 'han' ? r >= 5 : r <= 4;
        if (crossed) v += 4;
      }
      score += (p.side === toMove ? v : -v);
    }
  return score;
}
function orderMoves(moves) {
  return moves.slice().sort((a,b) => (b.capture?1:0) - (a.capture?1:0));
}
const MATE_SCORE = 9000;

function negamaxFast(board, depth, alpha, beta, toMove, deadline) {
  if (!findGeneral(board, toMove)) return { score:-MATE_SCORE-depth };
  if (Date.now() > deadline) return { score: evaluate(board, toMove), timeout:true };
  const pseudo = orderMoves(genAllPseudoMoves(board, toMove));
  if (pseudo.length === 0) return { score:-MATE_SCORE-depth };
  if (depth === 0) return { score: evaluate(board, toMove) };

  let best = -Infinity, bestMove = pseudo[0], timedOut = false;
  for (const m of pseudo) {
    const target = board[m.to.r][m.to.c];
    if (target && target.type === 'G') return { score: MATE_SCORE+depth, move:m };
    const { board: nb } = applyMove(board, m);
    const res = negamaxFast(nb, depth-1, -beta, -alpha, opponent(toMove), deadline);
    const score = -res.score;
    if (score > best) { best = score; bestMove = m; }
    if (best > alpha) alpha = best;
    if (alpha >= beta) break;
    if (res.timeout) { timedOut = true; break; }
  }
  return { score: best, move: bestMove, timeout: timedOut };
}

function findBestMove(board, side, maxDepth, timeLimitMs) {
  const deadline = Date.now() + timeLimitMs;
  const rootMoves = orderMoves(genLegalMoves(board, side));
  if (rootMoves.length === 0) return null;
  let overallBest = { move: rootMoves[0], score:-Infinity };

  for (let d = 1; d <= maxDepth; d++) {
    let alpha = -Infinity, beta = Infinity;
    let bestAtDepth = null, timedOut = false;
    for (const m of rootMoves) {
      const target = board[m.to.r][m.to.c];
      let score;
      if (target && target.type === 'G') score = MATE_SCORE + d;
      else {
        const { board: nb } = applyMove(board, m);
        const res = negamaxFast(nb, d-1, -beta, -alpha, opponent(side), deadline);
        score = -res.score;
        if (res.timeout && Date.now() > deadline) timedOut = true;
      }
      if (!bestAtDepth || score > bestAtDepth.score) bestAtDepth = { move: m, score };
      if (score > alpha) alpha = score;
      if (timedOut) break;
    }
    if (bestAtDepth) overallBest = bestAtDepth;
    if (Date.now() > deadline) break;
  }
  return overallBest;
}

const DIFFICULTY = {
  easy:   { depth:2, time:1200 },
  normal: { depth:4, time:2500 },
  hard:   { depth:7, time:6000 }
};

/* ---------------------------------------------------------
   외부 엔진: Fairy-Stockfish (WASM) 연동 시도
   - "굴비장기"의 실제 엔진이며 janggi 변형을 지원한다.
   - 브라우저에서 CDN 스크립트로 로드가 실패하면(네트워크 차단,
     경로 문제 등) 자동으로 내장 엔진으로 조용히 대체된다.
   --------------------------------------------------------- */
const SF_CDN_URL = 'https://cdn.jsdelivr.net/npm/fairy-stockfish-nnue.wasm@1.1.11/stockfish.js';
const FEN_CHAR = { R:'r', H:'n', E:'b', A:'a', G:'k', C:'c', S:'p' };

let sfEngine = null;
let sfState = 'idle'; // idle | loading | ready | failed
let sfPendingResolve = null;

function boardToFen(board, turn) {
  const rows = [];
  for (let r = 0; r < ROWS; r++) {
    let rowStr = '', empty = 0;
    for (let c = 0; c < COLS; c++) {
      const p = board[r][c];
      if (!p) { empty++; continue; }
      if (empty > 0) { rowStr += empty; empty = 0; }
      const ch = FEN_CHAR[p.type];
      rowStr += p.side === 'cho' ? ch.toUpperCase() : ch;
    }
    if (empty > 0) rowStr += empty;
    rows.push(rowStr);
  }
  // board 배열의 r=0(한 쪽 끝)이 janggi FEN의 랭크10(맨 앞)과 그대로 대응한다.
  return `${rows.join('/')} ${turn === 'cho' ? 'w' : 'b'} - - 0 1`;
}

function parseUciSquarePair(uci) {
  const m = uci.match(/^([a-i])([0-9]+)([a-i])([0-9]+)/);
  if (!m) return null;
  return {
    from: { r: 10 - parseInt(m[2], 10), c: m[1].charCodeAt(0) - 97 },
    to:   { r: 10 - parseInt(m[4], 10), c: m[3].charCodeAt(0) - 97 }
  };
}

function sfMessageHandler(line) {
  if (typeof line !== 'string') return;
  if (line.startsWith('bestmove') && sfPendingResolve) {
    const parts = line.split(' ');
    const resolve = sfPendingResolve;
    sfPendingResolve = null;
    resolve(parts[1] === '(none)' ? null : parts[1]);
  }
}

function loadStockfishScript(timeoutMs) {
  return new Promise((resolve) => {
    let settled = false;
    const finish = (val) => { if (!settled) { settled = true; resolve(val); } };
    const script = document.createElement('script');
    script.src = SF_CDN_URL;
    script.onload = () => {
      if (typeof window.Stockfish !== 'function') { finish(null); return; }
      window.Stockfish().then((sf) => finish(sf)).catch(() => finish(null));
    };
    script.onerror = () => finish(null);
    document.head.appendChild(script);
    setTimeout(() => finish(null), timeoutMs);
  });
}

async function initStockfish() {
  sfState = 'loading';
  updateEngineLabel();
  const sf = await loadStockfishScript(15000);
  if (!sf) { sfState = 'failed'; updateEngineLabel(); return; }
  sfEngine = sf;
  sfEngine.addMessageListener(sfMessageHandler);

  await new Promise((resolve) => {
    let uciOk = false, readyOk = false;
    const timer = setTimeout(() => resolve(), 8000);
    const handler = (line) => {
      if (line === 'uciok') {
        uciOk = true;
        sfEngine.postMessage('setoption name UCI_Variant value janggi');
        sfEngine.postMessage('ucinewgame');
        sfEngine.postMessage('isready');
      } else if (line === 'readyok' && uciOk) {
        readyOk = true;
        clearTimeout(timer);
        sfEngine.removeMessageListener && sfEngine.removeMessageListener(handler);
        resolve();
      }
    };
    sfEngine.addMessageListener(handler);
    sfEngine.postMessage('uci');
  });
  sfState = 'ready';
  updateEngineLabel();
}

function sfFindMove(fen, movetimeMs) {
  return new Promise((resolve) => {
    sfPendingResolve = resolve;
    sfEngine.postMessage(`position fen ${fen}`);
    sfEngine.postMessage(`go movetime ${movetimeMs}`);
    setTimeout(() => { if (sfPendingResolve) { sfPendingResolve = null; resolve(null); } }, movetimeMs + 4000);
  });
}

function updateEngineLabel() {
  const el = document.getElementById('engineLabel');
  if (!el) return;
  if (ssState === 'ready') { el.textContent = '엔진: ssanatos 엔진 (JS)'; return; }
  if (ssState === 'loading') { el.textContent = 'ssanatos 엔진 로딩 중…'; return; }
  const label = {
    idle: '', loading: '외부 엔진(Fairy-Stockfish) 로딩 중…',
    ready: '엔진: Fairy-Stockfish', failed: '엔진: 내장 엔진'
  }[sfState];
  el.textContent = label;
}

/* ---------------------------------------------------------
   외부 엔진 2: 동우장기류 원본 C++ 엔진 (Emscripten WASM 빌드)
   - 사용자가 제공한 search.cpp/search.hpp(EMSCRIPTEN_BINDINGS 포함)를
     로컬에서 emcc로 컴파일해 만든 ssanatos-engine.js/.wasm을 index.html과
     같은 폴더에 두면 자동으로 로드해서 사용한다 (완전 정적, CDN 불필요).
   - 파일이 없으면 <script> 로드가 실패하고 자동으로 무시된다.
   --------------------------------------------------------- */
const SS_LETTER = {
  G:{cho:'J',han:'j'}, A:{cho:'A',han:'a'}, C:{cho:'P',han:'p'},
  S:{cho:'B',han:'b'}, H:{cho:'S',han:'s'}, E:{cho:'M',han:'m'}, R:{cho:'C',han:'c'}
};
const SS_SIDE = { cho: 1, han: 2 };

let ssModuleFactory = null;
let ssEngine = null;
let ssState = 'idle'; // idle | loading | ready | failed

function loadSsanatosScript(timeoutMs) {
  return new Promise((resolve) => {
    // 이미 같은 페이지 안에 엔진 코드가 인라인으로 포함돼 있다면(단일 파일 버전) 바로 사용.
    if (typeof window.SsanatosEngine === 'function') { resolve(window.SsanatosEngine); return; }
    let settled = false;
    const finish = (val) => { if (!settled) { settled = true; resolve(val); } };
    const script = document.createElement('script');
    script.src = 'ssanatos-engine.js'; // index.html과 같은 폴더에 있어야 함
    script.onload = () => finish(typeof window.SsanatosEngine === 'function' ? window.SsanatosEngine : null);
    script.onerror = () => finish(null);
    document.head.appendChild(script);
    setTimeout(() => finish(null), timeoutMs);
  });
}

async function initSsanatos() {
  ssState = 'loading';
  updateEngineLabel();
  const factory = await loadSsanatosScript(6000);
  if (!factory) { ssState = 'failed'; updateEngineLabel(); return; }
  try {
    ssModuleFactory = await factory();
    ssState = 'ready';
  } catch (e) { ssState = 'failed'; }
  updateEngineLabel();
}

// 현재 state.board 전체를 새 Search 인스턴스에 반영한다 (새 게임 시작 시 1회 호출).
function ssSetupGame(board) {
  if (ssState !== 'ready') return;
  try {
    ssEngine = new ssModuleFactory.Search();
    ssEngine.initParams(3, 17, 4000, 8000);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = board[r][c];
        if (!p) continue;
        ssEngine.addPiece(c, r, SS_LETTER[p.type][p.side]);
      }
    }
  } catch (e) { ssEngine = null; ssState = 'failed'; updateEngineLabel(); }
}

// 사람/AI가 둔 수를 동우장기 엔진 내부 상태에도 동일하게 반영(미러링)한다.
function ssMirrorMove(move) {
  if (ssState !== 'ready' || !ssEngine) return;
  try {
    const ret = ssEngine.makeMove(move.from.c, move.from.r, move.to.c, move.to.r);
    if (ret < 0) { ssState = 'failed'; ssEngine = null; updateEngineLabel(); }
  } catch (e) { ssState = 'failed'; ssEngine = null; updateEngineLabel(); }
}

function ssMirrorUndo(times) {
  if (ssState !== 'ready' || !ssEngine) return;
  try { for (let i = 0; i < times; i++) ssEngine.moveBack(); }
  catch (e) { ssState = 'failed'; ssEngine = null; updateEngineLabel(); }
}

function ssDecodeMove(mv) {
  if (!mv) return null;
  const sqSrc = mv & 0xff, sqDst = (mv >>> 8) & 0xff;
  const fromX = (sqSrc & 0x0f) - 3, fromY = (sqSrc >> 4) - 3;
  const toX = (sqDst & 0x0f) - 3, toY = (sqDst >> 4) - 3;
  return { from: { r: fromY, c: fromX }, to: { r: toY, c: toX } };
}

// 동우장기 엔진에게 최선의 수를 물어보고, 실제로 그 수를 엔진에도 확정 반영한다.
function ssFindMove(side) {
  if (ssState !== 'ready' || !ssEngine) return null;
  try {
    const mv = ssEngine.getBestMove(SS_SIDE[side], 0);
    const pair = ssDecodeMove(mv);
    if (!pair) return null;
    ssEngine.makeMove(pair.from.c, pair.from.r, pair.to.c, pair.to.r);
    return pair;
  } catch (e) { ssState = 'failed'; ssEngine = null; updateEngineLabel(); return null; }
}

      ring.setAttribute('r', 29);
      ring.setAttribute('fill','none');
      ring.setAttribute('stroke','#ffd77a');
      ring.setAttribute('stroke-width','2');
      ring.setAttribute('opacity','0.65');
      markLayer.appendChild(ring);
    });
  }

  // 선택 표시 + 가능한 수
  if (state.selected) {
    const sel = svgns('circle');
    sel.setAttribute('cx', px(state.selected.c)); sel.setAttribute('cy', py(state.selected.r));
    sel.setAttribute('r', 30);
    sel.setAttribute('fill','none');
    sel.setAttribute('stroke','#8fe3c7');
    sel.setAttribute('stroke-width','3');
    markLayer.appendChild(sel);

    state.legalForSelected.forEach(m => {
      const dot = svgns('circle');
      dot.setAttribute('cx', px(m.to.c)); dot.setAttribute('cy', py(m.to.r));
      dot.setAttribute('r', m.capture ? 28 : 8);
      dot.setAttribute('fill', m.capture ? 'none' : '#8fe3c7');
      if (m.capture) { dot.setAttribute('stroke','#ff8a6b'); dot.setAttribute('stroke-width','3'); }
      dot.setAttribute('opacity','0.85');
      markLayer.appendChild(dot);
    });
  }

  for (let r=0;r<ROWS;r++){
    for (let c=0;c<COLS;c++){
      const p = state.board[r][c];
      if (!p) continue;
      const cx = px(c), cy = py(r);
      const g = svgns('g');
      g.setAttribute('transform', `translate(${cx},${cy})`);

      const rim = svgns('circle');
      rim.setAttribute('r', 25);
      rim.setAttribute('fill', '#e9cd93');
      rim.setAttribute('stroke', p.type === 'G' ? '#c8a24a' : '#9c7239');
      rim.setAttribute('stroke-width', p.type === 'G' ? 3.5 : 2.5);
      g.appendChild(rim);

      const rim2 = svgns('circle');
      rim2.setAttribute('r', 20.5);
      rim2.setAttribute('fill', 'none');
      rim2.setAttribute('stroke', '#c7a35f');
      rim2.setAttribute('stroke-width', 1);
      rim2.setAttribute('opacity','0.7');
      g.appendChild(rim2);

      const text = svgns('text');
      text.setAttribute('text-anchor','middle');
      text.setAttribute('dominant-baseline','central');
      text.setAttribute('font-family',"'Song Myung', serif");
      text.setAttribute('font-size', p.type==='G' ? '25' : '23');
      text.setAttribute('fill', p.side === 'han' ? '#a8342a' : '#1f5b46');
      text.textContent = PIECE_LABEL[p.side][p.type];
      g.appendChild(text);

      pieceLayer.appendChild(g);
    }
  }
}

function pieceName(type) {
  return { G:'궁', A:'사', E:'상', H:'마', R:'차', C:'포', S:'졸' }[type];
}
function sideName(side) { return side === 'han' ? '한' : '초'; }

function appendLog(side, move, captured) {
  const div = document.createElement('div');
  const n = state.log.length;
  const capText = captured ? ` (x${pieceName(captured.type)})` : '';
  div.innerHTML = `${n}. <span class="${side==='han'?'mh':'mc'}">${sideName(side)}</span> ${pieceName(move.piece)} (${move.from.c+1},${move.from.r+1})→(${move.to.c+1},${move.to.r+1})${capText}`;
  const log = document.getElementById('moveLog');
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function updateTurnBadge() {
  const badge = document.getElementById('turnBadge');
  if (state.gameOver) { badge.innerHTML = `대국 종료`; return; }
  const isHuman = state.turn === state.humanSide;
  const dotClass = state.turn === 'han' ? 'han' : 'cho';
  badge.innerHTML = `<span class="side-dot ${dotClass}"></span> ${sideName(state.turn)} 차례 ${isHuman ? '(당신)' : '(AI)'}`;
}

function checkGameEnd() {
  const legal = genLegalMoves(state.board, state.turn);
  if (legal.length === 0) {
    state.gameOver = true;
    const inChk = isInCheck(state.board, state.turn);
    const winner = opponent(state.turn);
    showEndModal(winner, inChk);
    return true;
  }
  return false;
}

function showEndModal(winnerSide, wasCheck) {
  document.getElementById('modalTitle').textContent =
    (winnerSide === state.humanSide) ? '승리했습니다!' : 'AI가 승리했습니다';
  document.getElementById('modalDesc').textContent =
    `${sideName(winnerSide)}(${winnerSide===state.humanSide?'당신':'AI'})의 승리 — ` +
    (wasCheck ? '외통(체크메이트)' : '더 이상 둘 수 있는 수가 없습니다') + '.';
  document.getElementById('modalOverlay').hidden = false;
}

function doMove(move, skipSsMirror) {
  const { board: nb, captured } = applyMove(state.board, move);
  state.board = nb;
  appendLog(state.turn, move, captured);
  state.log.push(move);
  if (!skipSsMirror) ssMirrorMove(move);
  state.turn = opponent(state.turn);
  state.selected = null;
  state.legalForSelected = [];
  state.history.push({ board: cloneBoard(state.board), turn: state.turn });
  renderPieces();
  updateTurnBadge();
}

async function aiTurn() {
  if (state.gameOver) return;
  state.aiThinking = true;
  document.getElementById('thinkingLabel').textContent = 'AI가 생각 중...';
  await new Promise(r => setTimeout(r, 60));

  const cfg = DIFFICULTY[state.difficulty];
  let move = null;
  let usedDw = false;

  if (state.difficulty === 'hard' && ssState === 'ready') {
    const pair = ssFindMove(state.turn);
    if (pair) {
      const legal = genLegalMoves(state.board, state.turn);
      move = legal.find(m => m.from.r === pair.from.r && m.from.c === pair.from.c &&
                              m.to.r === pair.to.r && m.to.c === pair.to.c) || null;
      if (move) usedDw = true;
    }
  }

  if (!move && state.difficulty === 'hard' && sfState === 'ready') {
    try {
      const fen = boardToFen(state.board, state.turn);
      const uci = await sfFindMove(fen, cfg.time);
      if (uci) {
        const pair = parseUciSquarePair(uci);
        if (pair) {
          const legal = genLegalMoves(state.board, state.turn);
          move = legal.find(m => m.from.r === pair.from.r && m.from.c === pair.from.c &&
                                  m.to.r === pair.to.r && m.to.c === pair.to.c) || null;
        }
      }
    } catch (e) { move = null; }
  }

  if (!move) {
    const res = findBestMove(state.board, state.turn, cfg.depth, cfg.time);
    move = res && res.move;
    usedDw = false;
  }

  document.getElementById('thinkingLabel').textContent = '';
  state.aiThinking = false;
  if (!move) { checkGameEnd(); return; }
  doMove(move, usedDw);
  if (checkGameEnd()) return;
  state.legalForHuman = genLegalMoves(state.board, state.humanSide);
}

function onBoardClick(e) {
  if (state.gameOver || state.aiThinking) return;
  if (state.turn !== state.humanSide) return;
  const target = e.target.closest('[data-r]');
  if (!target) return;
  const r = parseInt(target.dataset.r,10), c = parseInt(target.dataset.c,10);
  const piece = state.board[r][c];

  if (state.selected) {
    const match = state.legalForSelected.find(m => m.to.r === r && m.to.c === c);
    if (match) {
      doMove(match);
      if (checkGameEnd()) return;
      aiTurn();
      return;
    }
    if (piece && piece.side === state.humanSide) {
      selectPiece(r, c);
    } else {
      state.selected = null; state.legalForSelected = [];
      renderPieces();
    }
    return;
  }
  if (piece && piece.side === state.humanSide) selectPiece(r, c);
}

function selectPiece(r, c) {
  state.selected = { r, c };
  state.legalForSelected = state.legalForHuman.filter(m => m.from.r === r && m.from.c === c);
  renderPieces();
}

function undo() {
  if (state.aiThinking || state.gameOver) return;
  // 사람 차례로 되돌리기: 최소 2수(사람+AI) 또는 1수 되돌림
  if (state.history.length <= 1) return;
  let popCount = 0;
  // 마지막 human-turn 상태를 찾을 때까지 되돌림 (최대 2단계)
  while (state.history.length > 1 && popCount < 2) {
    state.history.pop();
    popCount++;
    const top = state.history[state.history.length - 1];
    if (top.turn === state.humanSide) break;
  }
  const top = state.history[state.history.length - 1];
  state.board = cloneBoard(top.board);
  state.turn = top.turn;
  state.selected = null;
  state.legalForSelected = [];
  state.legalForHuman = genLegalMoves(state.board, state.humanSide);
  state.log = state.log.slice(0, Math.max(0, state.log.length - popCount));
  const log = document.getElementById('moveLog');
  for (let i = 0; i < popCount; i++) {
    if (log.lastChild) log.removeChild(log.lastChild);
  }
  ssMirrorUndo(popCount);
  renderPieces();
  updateTurnBadge();
}

/* =========================================================
   3. 설정 화면 / 초기화
   ========================================================= */
function getArrangement(side) {
  const left = document.querySelector(`input[name="${side}Left"]:checked`).value;
  const right = document.querySelector(`input[name="${side}Right"]:checked`).value;
  return { left, right };
}

document.getElementById('startBtn').addEventListener('click', () => {
  const choArr = getArrangement('cho');
  const hanArr = getArrangement('han');
  const difficulty = document.getElementById('difficultySelect').value;

  state = newGameState(choArr, hanArr, difficulty, 'cho');
  ssSetupGame(state.board);

  document.getElementById('setupScreen').hidden = true;
  document.getElementById('gameScreen').hidden = false;

  const svg = document.getElementById('boardSvg');
  buildBoardStatic(svg);
  svg.addEventListener('click', onBoardClick);
  renderPieces();
  updateTurnBadge();
  updateEngineLabel();
});

// 페이지 로드 시 미리 백그라운드에서 로딩을 시도해 둔다 (실패해도 게임엔 영향 없음).
initSsanatos();
initStockfish();

document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('newGameBtn').addEventListener('click', () => location.reload());
document.getElementById('modalNewGameBtn').addEventListener('click', () => location.reload());
</script>
